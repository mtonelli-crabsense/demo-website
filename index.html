<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Primer Sitio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #1e293b;
  }
  .logo {
    font-weight: 700;
    font-size: 1.1rem;
    color: #f1f5f9;
    text-decoration: none;
  }
  nav {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .nav-links a {
    color: #cbd5e1;
    text-decoration: none;
    font-size: 0.95rem;
    transition: color 0.15s ease;
  }
  .nav-links a:hover {
    color: #38bdf8;
  }
  .cta-button {
    background: #38bdf8;
    color: #0f172a;
    border: none;
    padding: 10px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .cta-button:hover {
    background: #7dd3fc;
    transform: translateY(-2px);
  }
  .menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .menu-toggle span {
    width: 24px;
    height: 2px;
    background: #f1f5f9;
    border-radius: 2px;
  }

  /* ---------- Hero ---------- */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  main p {
    font-size: 1.1rem;
    color: #94a3b8;
    max-width: 480px;
    margin-bottom: 24px;
  }
  main button {
    background: #38bdf8;
    color: #0f172a;
    border: none;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  main button:hover {
    background: #7dd3fc;
    transform: translateY(-2px);
  }
  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.85rem;
    color: #475569;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 720px) {
    .nav-links {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      padding: 16px 24px;
      gap: 16px;
      display: none;
    }
    .nav-links.open {
      display: flex;
    }
    nav {
      gap: 12px;
    }
    .menu-toggle {
      display: flex;
    }
    .cta-button {
      padding: 8px 16px;
      font-size: 0.85rem;
    }
    h1 {
      font-size: 1.9rem;
    }
  }

  @media (max-width: 420px) {
    .cta-button.desktop-only {
      display: none;
    }
  }
</style>
</head>
<body>
  <header>
    <a href="#" class="logo">Ejemplo Co.</a>
    <nav>
      <ul class="nav-links" id="navLinks">
        <li><a href="#inicio">Inicio</a></li>
        <li><a href="#servicios">Servicios</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
      <a href="#contacto" class="cta-button desktop-only">Empezar ahora!</a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <main>
    <h1>¡Hola, mundo! 🚀</h1>
    <p>Esta es una página de ejemplo, lista para desplegarse en Vercel. Editá este archivo para hacer tu primer cambio.</p>
    <button onclick="document.body.style.background='#1e293b'">Cambiar fondo</button>
  </main>

  <footer>Creado el 10 de julio de 2026</footer>

  <script>
    const toggle = document.getElementById('menuToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      links.classList.toggle('open');
    });
  </script>
</body>
</html>
