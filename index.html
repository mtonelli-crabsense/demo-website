<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Primer Sitio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    font-size: 1.1rem;
    color: #94a3b8;
    max-width: 480px;
    margin-bottom: 24px;
  }
  button {
    background: #38bdf8;
    color: #0f172a;
    border: none;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  button:hover {
    background: #7dd3fc;
    transform: translateY(-2px);
  }
  footer {
    margin-top: 40px;
    font-size: 0.85rem;
    color: #475569;
  }
</style>
</head>
<body>
  <h1>¡Hola, mundo! 🚀</h1>
  <p>Esta es una página de ejemplo, lista para desplegarse en Vercel. Editá este archivo para hacer tu primer cambio.</p>
  <button onclick="document.body.style.background='#1e293b'">Cambiar fondo</button>
  <footer>Creado el 10 de julio de 2026</footer>
</body>
</html>
